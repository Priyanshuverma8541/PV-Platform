version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: pv-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITID_ROOT_USERNAME: admin
      MONGO_INITID_ROOT_PASSWORD: password123
    volumes:
      - mongodb_data:/data/db
    networks:
      - pv-network

  redis:
    image: redis:7-alpine
    container_name: pv-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - pv-network

  api-gateway:
    build:
      context: ../backend/api-gateway
      dockerfile: Dockerfile
    container_name: pv-api-gateway
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3001
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - auth-service
    networks:
      - pv-network

  auth-service:
    build:
      context: ../backend/auth-service
      dockerfile: Dockerfile
    container_name: pv-auth-service
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/pv_ecosystem?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    networks:
      - pv-network

  portfolio:
    build:
      context: ../apps/portfolio
      dockerfile: Dockerfile
    container_name: pv-portfolio
    restart: always
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - api-gateway
    networks:
      - pv-network

volumes:
  mongodb_data:

networks:
  pv-network:
    driver: bridge